<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>SAAB video Collab - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="vc-body vc-login-page">
    <main class="vc-login-main">
      <section class="vc-login-card">
        <div class="vc-login-brand">
          <img src="/assets/Saab_neg.png" alt="Logo SAAB" class="vc-login-logo" />
        </div>
        <h2 class="vc-login-title">Video Collab SAAB</h2>
        <p class="vc-login-subtitle">
          Personalize o vídeo em homenagem às pessoas que fazem parte do Gripen produzido no Brasil<br /><br />
          Insira seu e-mail profissional para acessar.
        </p>

        <form class="vc-form" method="POST" action="/login">
          <label for="email" class="vc-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="vc-input vc-login-input"
            placeholder="seu.nome@empresa.com.br"
            required
          />
          <p id="login-error" class="vc-error-message" hidden>
            E-mail não autorizado.
          </p>

          <button type="submit" class="vc-button vc-login-button">
            Entrar
          </button>
        </form>
      </section>
    </main>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const hasError = params.get('error') === '1' || params.get('error') === '2';
        const errorEl = document.getElementById('login-error');
        if (hasError && errorEl) {
          errorEl.hidden = false;
        }
      })();
    </script>
  </body>
</html>
